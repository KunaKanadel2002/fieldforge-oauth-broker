<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FieldForge OAuth Broker</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #0a0e1a 0%, #1e293b 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

      max-width: 600px;

      background: rgba(16,185,129,0.1); 
      border: 1px solid #10b981;
      padding: 12px;
      border-radius: 8px;
      margin-top: 24px;
      color: #10b981;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 FieldForge OAuth Broker</h1>
    <p>This service enables FieldForge to authenticate with any Salesforce org.</p>
    <div class="status">✅ Service is running</div>
  </div>

</html>
